services:
  api:
    build: .
    container_name: svachalan-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    networks:
      - svachalan-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: svachalan-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - svachalan-net
networks:
  svachalan-net:
    driver: bridge


