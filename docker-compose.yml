services:
  api:
    build: .
    container_name: svachalan-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:8-alpine
    container_name: svachalan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  supermemory:
    build:
      context: .
      dockerfile: Dockerfile.supermemory
    container_name: svachalan-supermemory
    restart: unless-stopped
    ports:
      - "6767:6767"
    environment:
      - GEMINI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - SUPERMEMORY_API_KEY=${SUPERMEMORY_API_KEY}
      - HOST=0.0.0.0
      - HOSTNAME=0.0.0.0
    volumes:
      - supermemory-data:/var/lib/supermemory

volumes:
  redis-data:
  supermemory-data: