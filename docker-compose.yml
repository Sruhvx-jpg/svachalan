services:
  api:
    build: .
    container_name: svachalan-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:8-alpine
    container_name: svachalan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data: